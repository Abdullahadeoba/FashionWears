<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/logo/Fashionwears.png">
    <title>FashionWears</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h3 class="text-center">Login</h3>
                    <form action="login.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input type="text" name="username_or_email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <p class="text-center mt-3">
                        Don't have an account? <a href="register.html">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Optional: Prevent login if fields are empty
        document.querySelector("form").addEventListener("submit", function(e) {
            let input = document.querySelector("[name='username_or_email']").value.trim();
            let password = document.querySelector("[name='password']").value.trim();

            if (input === "" || password === "") {
                alert("All fields are required!");
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
