<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/logo/Fashionwears.png">
    <title>FashionWears</title>
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap JS (Optional, for components like Modals, Dropdowns) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="/logo/Fashionwears.png" alt="FashionWears Logo" width="50" height="50" class="me-2">
                <span class="fw-bold">FashionWears</span>
            </a>            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-secondary text-white text-center py-5">
        <h1>Welcome to FashionWears</h1>
        <p>Your one-stop shop for trendy clothes, shoes, and accessories</p>
    </header>

    <!-- Products Section -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Latest Products</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="assets/shirts.jpg" class="card-img-top" alt="Shirt">
                    <div class="card-body">
                        <h5 class="card-title">Stylish Shirt</h5>
                        <p class="card-text">$25.00</p>
                        <a href="register.html" class="btn btn-primary">Buy Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="assets/shoes.jpg" class="card-img-top" alt="Shoes">
                    <div class="card-body">
                        <h5 class="card-title">Casual Shoes</h5>
                        <p class="card-text">$40.00</p>
                        <a href="register.html" class="btn btn-primary">Buy Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="assets/watch.jpg" class="card-img-top" alt="Watch">
                    <div class="card-body">
                        <h5 class="card-title">Luxury Watch</h5>
                        <p class="card-text">$120.00</p>
                        <a href="register.html" class="btn btn-primary">Buy Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2025 FashionWears. All rights reserved.</p>
    </footer>
</body>
</html>
